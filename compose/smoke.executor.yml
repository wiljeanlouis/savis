name: savis-smoke

services:
  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: savis
      RABBITMQ_DEFAULT_PASS: savis
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 30

  executor_worker:
    build:
      context: ../savis-executor
      dockerfile: Dockerfile
      target: worker
    init: true
    environment:
      RABBIT_MQ_URL: amqp://savis:savis@rabbitmq:5672/%2f
      DATABASE_URL: postgresql+psycopg://savis:savis@postgres:5432/savis
      DATABASE_SCHEMA: savis_executor
      BROWSER_CDP_URL: http://host.docker.internal:9222
    depends_on:
      rabbitmq:
        condition: service_healthy
