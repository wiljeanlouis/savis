name: Release images

on:
  push:
    tags:
      - "v*.*.*"
      - "savis-v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Build immutable release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Validate release tag and source branch
        id: version
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          release_tag="${RELEASE_TAG}"
          version="${release_tag#savis-}"
          source_sha="$(git rev-parse HEAD)"
          [[ "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git merge-base --is-ancestor "${source_sha}" origin/main
          echo "release_tag=${release_tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "source_sha=${source_sha}" >>"${GITHUB_OUTPUT}"
          echo "short_sha=${source_sha::12}" >>"${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish API
        id: api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: savis-api
          target: production
          push: true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ghcr.io/wiljeanlouis/savis-api:${{ steps.version.outputs.version }}
            ghcr.io/wiljeanlouis/savis-api:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.version.outputs.source_sha }}

      - name: Build and publish Admin
        id: admin
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: savis-admin
          target: production
          push: true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          tags: |
            ghcr.io/wiljeanlouis/savis-admin:${{ steps.version.outputs.version }}
            ghcr.io/wiljeanlouis/savis-admin:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.version.outputs.source_sha }}

      - name: Build and publish Executor
        id: executor
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: savis-executor
          push: true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=executor
          cache-to: type=gha,mode=max,scope=executor
          tags: |
            ghcr.io/wiljeanlouis/savis-executor:${{ steps.version.outputs.version }}
            ghcr.io/wiljeanlouis/savis-executor:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.version.outputs.source_sha }}

      - name: Assemble release package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_REVISION: ${{ steps.version.outputs.source_sha }}
          API_DIGEST: ${{ steps.api.outputs.digest }}
          ADMIN_DIGEST: ${{ steps.admin.outputs.digest }}
          EXECUTOR_DIGEST: ${{ steps.executor.outputs.digest }}
        run: |
          package="savis-${VERSION}"
          mkdir -p "${package}/deploy/scripts" "${package}/supabase"
          cp compose.prod.yml "${package}/"
          cp deploy/scripts/deploy-production.sh "${package}/deploy/scripts/"
          cp -R supabase/migrations "${package}/supabase/"
          cat >"${package}/release.env" <<EOF
          SAVIS_VERSION=${VERSION}
          SOURCE_REVISION=${SOURCE_REVISION}
          SAVIS_API_IMAGE=ghcr.io/wiljeanlouis/savis-api@${API_DIGEST}
          SAVIS_ADMIN_IMAGE=ghcr.io/wiljeanlouis/savis-admin@${ADMIN_DIGEST}
          SAVIS_EXECUTOR_IMAGE=ghcr.io/wiljeanlouis/savis-executor@${EXECUTOR_DIGEST}
          EOF
          chmod +x "${package}/deploy/scripts/deploy-production.sh"
          tar -czf "${package}.tar.gz" "${package}"
          sha256sum "${package}.tar.gz" >"${package}.tar.gz.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            savis-${{ steps.version.outputs.version }}.tar.gz
            savis-${{ steps.version.outputs.version }}.tar.gz.sha256
