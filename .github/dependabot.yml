# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

multi-ecosystem-groups:
  savis-admin:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
  savis-api:
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/Toronto"
  savis-executor:
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "America/Toronto"
  savis-infrastructure:
    schedule:
      interval: "monthly"
      day: "thursday"
      time: "09:00"
      timezone: "America/Toronto"

updates:
  - package-ecosystem: "npm"
    directory: "/savis-admin"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-admin"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/savis-admin"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-admin"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "maven"
    directory: "/savis-api"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-api"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/savis-api"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-api"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "uv"
    directory: "/savis-executor"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-executor"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/savis-executor"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-executor"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker-compose"
    directory: "/"
    patterns:
      - "postgres"
      - "rabbitmq"
    multi-ecosystem-group: "savis-infrastructure"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker-compose"
    directory: "/compose"
    patterns:
      - "postgres"
      - "rabbitmq"
      - "nginxinc/nginx-unprivileged"
    multi-ecosystem-group: "savis-infrastructure"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "savis-infrastructure"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
