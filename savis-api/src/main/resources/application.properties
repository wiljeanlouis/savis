spring.application.name=savis-api

spring.mvc.problemdetails.enabled=true
spring.threads.virtual.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=savis_api

spring.flyway.enabled=true
spring.flyway.default-schema=savis_api
spring.flyway.schemas=savis_api
spring.flyway.create-schemas=true

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}

savis.offer.request.queue=savis.offer.requests
savis.offer.request.exchange=savis.offer.requests.exchange
savis.offer.result.queue=savis.offer.results
savis.offer.invalidation.queue=savis.offer.invalidations

savis.supabase.enabled=${SUPABASE_ENABLED:false}
savis.supabase.url=${SUPABASE_URL:}
savis.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
savis.catalog.refresh-cron=${SAVIS_CATALOG_REFRESH_CRON:0 0 * * * *}

management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info
