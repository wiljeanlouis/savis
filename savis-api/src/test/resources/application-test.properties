spring.datasource.url=jdbc:h2:mem:savis;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS savis_api
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=savis_api
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

savis.offer.listener.auto-startup=false
