version: "3.8"
name: savis

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_MQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend_api:
    build:
      context: ./savis-api
      dockerfile: Dockerfile
      target: production
    container_name: savis_api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBIT_MQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_MQ_PASSWORD}
      - SUPABASE_ENABLED=${SUPABASE_ENABLED:-false}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend_admin:
    build:
      context: ./savis-admin
      dockerfile: Dockerfile
      target: production
    container_name: savis_admin
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_EXECUTOR_API_URL=http://localhost:8000
    depends_on:
      - backend_api

  executor_migrate:
    build:
      context: ./savis-executor
      dockerfile: Dockerfile
      target: api
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DATABASE_SCHEMA=savis_executor
    depends_on:
      postgres:
        condition: service_healthy

  executor_api:
    build:
      context: ./savis-executor
      dockerfile: Dockerfile
      target: api
    init: true
    container_name: savis_executor_api
    ports:
      - "8000:8000"
    environment:
      - RABBIT_MQ_URL=amqp://${RABBIT_MQ_USER}:${RABBIT_MQ_PASSWORD}@rabbitmq:5672/%2f
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DATABASE_SCHEMA=savis_executor
    depends_on:
      executor_migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  executor_worker:
    build:
      context: ./savis-executor
      dockerfile: Dockerfile
      target: worker
    init: true
    container_name: savis_executor_worker
    volumes:
      - ./savis-executor:/app
      - /app/.venv
    environment:
      - RABBIT_MQ_URL=amqp://${RABBIT_MQ_USER}:${RABBIT_MQ_PASSWORD}@rabbitmq:5672/%2f
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DATABASE_SCHEMA=savis_executor
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://host.docker.internal:9222}
      - PROVIDER_MIN_REQUEST_DELAY_SECONDS=${PROVIDER_MIN_REQUEST_DELAY_SECONDS:-60}
      - PROVIDER_MAX_REQUEST_DELAY_SECONDS=${PROVIDER_MAX_REQUEST_DELAY_SECONDS:-600}
      - PROVIDER_BLOCK_COOLDOWN_SECONDS=${PROVIDER_BLOCK_COOLDOWN_SECONDS:-900,3600,21600,86400}
      - PROVIDER_PROBE_TIMEOUT_SECONDS=${PROVIDER_PROBE_TIMEOUT_SECONDS:-1800}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      executor_migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  executor_beat:
    build:
      context: ./savis-executor
      dockerfile: Dockerfile
      target: beat
    init: true
    container_name: savis_executor_beat
    volumes:
      - ./savis-executor:/app
      - /app/.venv
    environment:
      - RABBIT_MQ_URL=amqp://${RABBIT_MQ_USER}:${RABBIT_MQ_PASSWORD}@rabbitmq:5672/%2f
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - DATABASE_SCHEMA=savis_executor
    depends_on:
      executor_migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
